databaseChangeLog:

  - changeSet:
      id: 001-create-roles
      author: lazareff

      changes:

        - createTable:
            tableName: roles

            columns:

              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_roles
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_roles_name

        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: USER

        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: ADMIN