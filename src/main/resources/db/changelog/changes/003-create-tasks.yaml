databaseChangeLog:

  - changeSet:
      id: 003-create-tasks
      author: lazareff

      changes:

        - createTable:
            tableName: tasks

            columns:

              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_tasks
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: VARCHAR(5000)

              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

              - column:
                  name: deadline
                  type: TIMESTAMP

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tasks_user
                    referencedTableName: users
                    referencedColumnNames: id

        - createIndex:
            tableName: tasks
            indexName: idx_tasks_user

            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: tasks
            indexName: idx_tasks_status

            columns:
              - column:
                  name: status